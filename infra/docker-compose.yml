version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: cfdi_postgres
    environment:
      POSTGRES_USER: cfdi
      POSTGRES_PASSWORD: cfdi_dev_pass
      POSTGRES_DB: cfdi_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cfdi"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cfdi_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: cfdi_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  minio-setup:
    image: minio/mc:latest
    container_name: cfdi_minio_setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin123;
        mc mb --ignore-existing local/raw-email-attachments;
        mc mb --ignore-existing local/normalized-cfdi;
        mc mb --ignore-existing local/zip-uploads;
        mc mb --ignore-existing local/generated-reports;
        mc mb --ignore-existing local/temp-processing;
        echo 'MinIO buckets ready';
      "
    restart: "no"

volumes:
  postgres_data:
  minio_data:
